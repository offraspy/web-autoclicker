<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karambit Spin Clicker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&display=swap');

        :root {
            --bg-color: #05010d;
            --main-font: 'Audiowide', cursive;
            --ui-purple: rgba(20, 7, 43, 0.75);
            --ui-purple-border: #4d0b8c;
            --accent-cyan: #0ff;
            --accent-pink: #d011f0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 4px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 3px);
            background-size: 400px 400px, 250px 250px;
            background-position: 0 0, 100px 150px;
            color: #fff;
            font-family: var(--main-font);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            width: 100vw;
            height: 100vh;
            max-width: 1400px;
            padding: 40px;
            box-sizing: border-box;
            gap: 40px;
        }

        /* --- LEFT PLAY AREA --- */
        #play-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        #game-title {
            font-size: 2.8rem;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }

        #canvas-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
            cursor: pointer;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #score-display-wrapper {
            text-align: center;
            margin-bottom: 20px;
        }

        #total-spins {
            font-size: 4.5rem;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(208, 17, 240, 0.3);
        }

        #spins-label {
            font-size: 1.2rem;
            color: #a09cb0;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .click-popup {
            position: absolute;
            font-size: 1.4rem;
            color: var(--accent-cyan);
            pointer-events: none;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0,255,255,0.8);
            animation: floatAway 0.8s ease-out forwards;
        }

        @keyframes floatAway {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
        }

        /* --- RIGHT SIDEBAR AREA --- */
        #sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            overflow-y: auto;
            max-height: 100vh;
            padding-right: 4px;
        }

        .panel {
            background: var(--ui-purple);
            border: 2px solid var(--ui-purple-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(77, 11, 140, 0.2);
        }

        .panel-header {
            font-size: 1.1rem;
            color: var(--accent-cyan);
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 5px;
        }

        .upgrade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upgrade-item:hover {
            background: rgba(0, 255, 255, 0.05);
            border-color: var(--accent-cyan);
        }

        .upgrade-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.08);
            background: rgba(0,0,0,0.2);
        }

        .upgrade-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .upgrade-name {
            font-size: 0.95rem;
            color: #ffffff;
        }

        .upgrade-desc {
            font-size: 0.75rem;
            color: #8c889e;
        }

        .upgrade-cost {
            font-size: 0.9rem;
            color: var(--accent-pink);
            font-weight: bold;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #c5c1d4;
        }

        .stat-value {
            color: #ffffff;
            font-weight: bold;
        }

        #autoclick-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 8px 0;
            font-size: 0.95rem;
            cursor: pointer;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        #status-toggle {
            color: var(--accent-pink);
            font-weight: bold;
        }

        #status-toggle.active {
            color: var(--accent-cyan);
            text-shadow: 0 0 8px rgba(0,255,255,0.4);
        }

        /* --- SKIN PANEL --- */
        .skin-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
        }

        .skin-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .skin-item:hover {
            border-color: var(--accent-cyan);
        }

        .skin-item.selected {
            border-color: var(--accent-cyan);
            background: rgba(0, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(0,255,255,0.2);
        }

        .skin-item.locked {
            opacity: 0.55;
        }

        .skin-swatch {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .skin-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex: 1;
        }

        .skin-name {
            font-size: 0.85rem;
            color: #fff;
        }

        .skin-sub {
            font-size: 0.7rem;
            color: #8c889e;
        }

        .skin-sub.owned {
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <main id="play-area">
            <h1 id="game-title">KARAMBIT SPIN CLICKER</h1>
            
            <div id="canvas-wrapper">
                <canvas id="gameCanvas" width="500" height="500"></canvas>
            </div>

            <div id="score-display-wrapper">
                <h2 id="total-spins">0</h2>
                <div id="spins-label">SPINS: [Count]</div>
            </div>
        </main>

        <aside id="sidebar">
            <div class="panel">
                <div class="panel-header">SKINS</div>
                <div id="skin-grid
