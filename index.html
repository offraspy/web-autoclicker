<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karambit Spin Clicker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&display=swap');

        :root {
            --bg-color: #05010d;
            --main-font: 'Audiowide', cursive;
            --ui-purple: rgba(20, 7, 43, 0.75);
            --ui-purple-border: #4d0b8c;
            --accent-cyan: #0ff;
            --accent-pink: #d011f0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 4px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 3px);
            background-size: 400px 400px, 250px 250px;
            background-position: 0 0, 100px 150px;
            color: #fff;
            font-family: var(--main-font);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            width: 100vw;
            height: 100vh;
            max-width: 1400px;
            padding: 40px;
            box-sizing: border-box;
            gap: 40px;
        }

        /* --- LEFT PLAY AREA --- */
        #play-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        #game-title {
            font-size: 2.8rem;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }

        #canvas-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
            cursor: pointer;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #score-display-wrapper {
            text-align: center;
            margin-bottom: 20px;
        }

        #total-spins {
            font-size: 4.5rem;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(208, 17, 240, 0.3);
        }

        #spins-label {
            font-size: 1.2rem;
            color: #a09cb0;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .click-popup {
            position: absolute;
            font-size: 1.4rem;
            color: var(--accent-cyan);
            pointer-events: none;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0,255,255,0.8);
            animation: floatAway 0.8s ease-out forwards;
        }

        @keyframes floatAway {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
        }

        /* --- RIGHT SIDEBAR AREA --- */
        #sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            overflow-y: auto;
            max-height: 100vh;
            padding-right: 4px;
        }

        .panel {
            background: var(--ui-purple);
            border: 2px solid var(--ui-purple-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(77, 11, 140, 0.2);
        }

        .panel-header {
            font-size: 1.1rem;
            color: var(--accent-cyan);
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 5px;
        }

        .upgrade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upgrade-item:hover {
            background: rgba(0, 255, 255, 0.05);
            border-color: var(--accent-cyan);
        }

        .upgrade-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.08);
            background: rgba(0,0,0,0.2);
        }

        .upgrade-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .upgrade-name {
            font-size: 0.95rem;
            color: #ffffff;
        }

        .upgrade-desc {
            font-size: 0.75rem;
            color: #8c889e;
        }

        .upgrade-cost {
            font-size: 0.9rem;
            color: var(--accent-pink);
            font-weight: bold;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #c5c1d4;
        }

        .stat-value {
            color: #ffffff;
            font-weight: bold;
        }

        #autoclick-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 8px 0;
            font-size: 0.95rem;
            cursor: pointer;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        #status-toggle {
            color: var(--accent-pink);
            font-weight: bold;
        }

        #status-toggle.active {
            color: var(--accent-cyan);
            text-shadow: 0 0 8px rgba(0,255,255,0.4);
        }

        /* --- SKIN PANEL --- */
        .skin-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
        }

        .skin-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .skin-item:hover {
            border-color: var(--accent-cyan);
        }

        .skin-item.selected {
            border-color: var(--accent-cyan);
            background: rgba(0, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(0,255,255,0.2);
        }

        .skin-item.locked {
            opacity: 0.55;
        }

        .skin-swatch {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .skin-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex: 1;
        }

        .skin-name {
            font-size: 0.85rem;
            color: #fff;
        }

        .skin-sub {
            font-size: 0.7rem;
            color: #8c889e;
        }

        .skin-sub.owned {
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <main id="play-area">
            <h1 id="game-title">KARAMBIT SPIN CLICKER</h1>
            
            <div id="canvas-wrapper">
                <canvas id="gameCanvas" width="500" height="500"></canvas>
            </div>

            <div id="score-display-wrapper">
                <h2 id="total-spins">0</h2>
                <div id="spins-label">SPINS: [Count]</div>
            </div>
        </main>

        <aside id="sidebar">
            <div class="panel">
                <div class="panel-header">SKINS</div>
                <div id="skin-grid" class="skin-grid"></div>
            </div>

            <div class="panel">
                <div class="panel-header">UPGRADES</div>
                <div id="whetstone" class="upgrade-item">
                    <div class="upgrade-info">
                        <span class="upgrade-name">Whetstone</span>
                        <span class="upgrade-desc">(Increases spins per click)</span>
                    </div>
                    <span class="upgrade-cost">Cost: 150</span>
                </div>
                <div id="balanced" class="upgrade-item">
                    <div class="upgrade-info">
                        <span class="upgrade-name">Balanced Blade</span>
                        <span class="upgrade-desc">(Automatic base spin rate)</span>
                    </div>
                    <span class="upgrade-cost">Cost: 500</span>
                </div>
                <div id="autospinner" class="upgrade-item">
                    <div class="upgrade-info">
                        <span class="upgrade-name">Autospinner Bot</span>
                        <span class="upgrade-desc">(Periodically clicks automatically)</span>
                    </div>
                    <span class="upgrade-cost">Cost: 2,500</span>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">STATS</div>
                <div class="stat-row">Current RPM: <span id="stat-rpm" class="stat-value">0</span></div>
                <div class="stat-row">Click Power: <span id="stat-click" class="stat-value">1</span></div>
                <div class="stat-row">Auto-Spins: <span id="stat-auto" class="stat-value">0</span></div>
                
                <div id="autoclick-btn">
                    <span>[x] Autoclick</span>
                    <span id="status-toggle">OFF</span>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // --- GAME ENGINE SETUP ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');

        // --- SKIN DEFINITIONS ---
        const SKINS = [
            {
                id: 'azure',
                name: 'Azure Standard',
                cost: 0,
                handle: '#1b1b22',
                handleStroke: '#383845',
                ring: '#00e5ff',
                edge: '#66e5ff',
                pattern: (g) => {
                    g.addColorStop(0, '#0055ff');
                    g.addColorStop(0.5, '#00bcff');
                    g.addColorStop(1, '#001144');
                }
            },
            {
                id: 'crimson-web',
                name: 'Crimson Weave',
                cost: 1000,
                handle: '#1a0d0d',
                handleStroke: '#4a1414',
                ring: '#ff3b3b',
                edge: '#ff9a9a',
                pattern: (g) => {
                    g.addColorStop(0, '#3a0000');
                    g.addColorStop(0.5, '#b30000');
                    g.addColorStop(1, '#1a0000');
                },
                overlay: (ctx2) => {
                    ctx2.strokeStyle = 'rgba(0,0,0,0.6)';
                    ctx2.lineWidth = 2;
                    for (let i = 0; i < 7; i++) {
                        const t = i / 6;
                        const x0 = -130 + t * 70;
                        const y0 = 40 + t * 160;
                        ctx2.beginPath();
                        ctx2.moveTo(x0 - 40, y0 - 20);
                        ctx2.lineTo(x0 + 40, y0 + 20);
                        ctx2.stroke();
                        ctx2.beginPath();
                        ctx2.moveTo(x0 - 20, y0 + 40);
                        ctx2.lineTo(x0 + 20, y0 - 40);
                        ctx2.stroke();
                    }
                }
            },
            {
                id: 'emerald-marble',
                name: 'Emerald Marble',
                cost: 2500,
                handle: '#0d1a12',
                handleStroke: '#1e4a30',
                ring: '#00ff9d',
                edge: '#9dffdb',
                pattern: (g) => {
                    g.addColorStop(0, '#00301f');
                    g.addColorStop(0.4, '#00b368');
                    g.addColorStop(0.7, '#00ff9d');
                    g.addColorStop(1, '#003322');
                }
            },
            {
                id: 'sunset-fade',
                name: 'Sunset Fade',
                cost: 4000,
                handle: '#22140d',
                handleStroke: '#5a2f18',
                ring: '#ff8a3d',
                edge: '#ffd39a',
                pattern: (g) => {
                    g.addColorStop(0, '#ff2e63');
                    g.addColorStop(0.5, '#ff8a3d');
                    g.addColorStop(1, '#ffe066');
                }
            },
            {
                id: 'obsidian-ghost',
                name: 'Obsidian Ghost',
                cost: 6000,
                handle: '#0a0a0d',
                handleStroke: '#2a2a33',
                ring: '#b39cff',
                edge: '#e6dcff',
                pattern: (g) => {
                    g.addColorStop(0, '#1a1a22');
                    g.addColorStop(0.5, '#4d3d80');
                    g.addColorStop(1, '#0a0a0d');
                }
            },
            {
                id: 'goldshine',
                name: 'Goldshine',
                cost: 9000,
                handle: '#221b0d',
                handleStroke: '#6b5119',
                ring: '#ffd700',
                edge: '#fff2b3',
                pattern: (g) => {
                    g.addColorStop(0, '#7a5c00');
                    g.addColorStop(0.5, '#ffd700');
                    g.addColorStop(1, '#3a2b00');
                }
            }
        ];

        let game = {
            spins: 0,
            rpm: 0,
            clickPower: 1,
            passiveSps: 0,
            autoclickerPurchased: false,
            autoclickActive: false,
            
            angle: 0,
            velocity: 0,
            friction: 0.985,
            
            costs: { whetstone: 150, balanced: 500, autospinner: 2500 },

            ownedSkins: ['azure'],
            currentSkin: 'azure'
        };

        const ui = {
            spins: document.getElementById('total-spins'),
            rpm: document.getElementById('stat-rpm'),
            click: document.getElementById('stat-click'),
            auto: document.getElementById('stat-auto'),
            toggle: document.getElementById('status-toggle'),
            whetstone: document.getElementById('whetstone'),
            balanced: document.getElementById('balanced'),
            autospinner: document.getElementById('autospinner'),
            skinGrid: document.getElementById('skin-grid')
        };

        function commas(x) { return Math.floor(x).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

        function getCurrentSkin() {
            return SKINS.find(s => s.id === game.currentSkin) || SKINS[0];
        }

        // --- SKIN PANEL RENDERING ---
        function renderSkinGrid() {
            ui.skinGrid.innerHTML = '';
            SKINS.forEach(skin => {
                const owned = game.ownedSkins.includes(skin.id);
                const selected = game.currentSkin === skin.id;

                const item = document.createElement('div');
                item.className = 'skin-item' + (selected ? ' selected' : '') + (!owned ? ' locked' : '');

                const swatch = document.createElement('div');
                swatch.className = 'skin-swatch';
                swatch.style.background = `linear-gradient(135deg, ${skin.edge}, ${skin.ring})`;
                item.appendChild(swatch);

                const info = document.createElement('div');
                info.className = 'skin-info';
                const nameEl = document.createElement('div');
                nameEl.className = 'skin-name';
                nameEl.textContent = skin.name;
                const subEl = document.createElement('div');
                subEl.className = 'skin-sub' + (owned ? ' owned' : '');
                subEl.textContent = owned ? (selected ? 'Equipped' : 'Owned - tap to equip') : `Unlock: ${commas(skin.cost)} spins`;
                info.appendChild(nameEl);
                info.appendChild(subEl);
                item.appendChild(info);

                item.addEventListener('click', () => {
                    if (owned) {
                        game.currentSkin = skin.id;
                        renderSkinGrid();
                    } else if (game.spins >= skin.cost) {
                        game.spins -= skin.cost;
                        game.ownedSkins.push(skin.id);
                        game.currentSkin = skin.id;
                        renderSkinGrid();
                        updateStorePanels();
                    }
                });

                ui.skinGrid.appendChild(item);
            });
        }

        // --- UNIFIED SHAPE GRAPHICS ENGINE ---
        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const skin = getCurrentSkin();

            // Background Target Ring
            ctx.beginPath();
            ctx.arc(cx, cy, 170, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.15)';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, 170, 0, Math.PI * 2);
            ctx.setLineDash([8, 15]);
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.stroke();
            ctx.setLineDash([]); 

            // Initialize rotation around the perfect center point
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(game.angle);

            // Shift coordinate anchor down right. This ensures the center of the ring (35, 15) becomes (0,0) for the rotation.
            ctx.translate(-35, -15);

            // 1. DRAW FINGER LOOP RING
            ctx.shadowColor = skin.ring;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(35, 15, 28, 0, Math.PI * 2);
            ctx.strokeStyle = skin.ring;
            ctx.lineWidth = 7;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // 2. DRAW METALLIC ERGONOMIC HANDLE HOUSING
            ctx.beginPath();
            ctx.moveTo(35, -13);
            ctx.bezierCurveTo(-10, -5, -45, 20, -75, 55); 
            ctx.bezierCurveTo(-65, 75, -45, 80, -35, 60); 
            ctx.bezierCurveTo(-20, 45, 5, 45, 20, 40); 
            ctx.closePath();
            ctx.fillStyle = skin.handle;
            ctx.fill();
            ctx.strokeStyle = skin.handleStroke;
            ctx.lineWidth = 3;
            ctx.stroke();

            // Handle Grip Indentations 
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.arc(-20 - (i * 18), 46 + (i * 3), 7, 0, Math.PI * 2);
                ctx.fill();
            }

            // 3. DRAW CURVED SAPPHIRE BLADE
            ctx.shadowColor = skin.edge;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.moveTo(-75, 55);
            ctx.bezierCurveTo(-110, 95, -120, 150, -90, 200); // Inner edge down to point
            ctx.bezierCurveTo(-135, 140, -125, 85, -60, 40);  // Spine edge back up to handle
            ctx.closePath();
            
            // Map the skin color gradient onto the new blade boundaries
            ctx.save();
            let patternGrad = ctx.createLinearGradient(-135, 40, -60, 200);
            skin.pattern(patternGrad);
            ctx.fillStyle = patternGrad;
            ctx.fill();
            ctx.restore();

            // Process unique skin overlays inside the blade shape bounds
            ctx.save();
            ctx.clip(); 
            ctx.shadowBlur = 0;
            if (skin.overlay) {
                skin.overlay(ctx);
            }
            
            // Highlight streak to simulate a fuller bevel line down the blade
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-65, 45);
            ctx.bezierCurveTo(-95, 75, -105, 105, -95, 150);
            ctx.stroke();
            ctx.restore();

            // Edge lining color execution
            ctx.strokeStyle = skin.edge;
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.restore(); 
        }

        // --- CORE PROCESS LOGIC ENGINE ---
        function updateStorePanels() {
            ui.spins.textContent = commas(game.spins);
            ui.rpm.textContent = commas(game.rpm);
            ui.click.textContent = commas(game.clickPower);
            ui.auto.textContent = commas(game.passiveSps * 60);

            [['whetstone', ui.whetstone], ['balanced', ui.balanced], ['autospinner', ui.autospinner]].forEach(([key, element]) => {
                element.querySelector('.upgrade-cost').textContent = `Cost: ${commas(game.costs[key])}`;
                if (game.spins >= game.costs[key]) {
                    element.classList.remove('disabled');
                } else {
                    element.classList.add('disabled');
                }
            });

            if (game.autoclickerPurchased) {
                ui.toggle.textContent = game.autoclickActive ? "ON" : "OFF";
                ui.toggle.className = game.autoclickActive ? "active" : "";
            } else {
                ui.toggle.textContent = "LOCKED";
            }

            const items = ui.skinGrid.children;
            SKINS.forEach((skin, i) => {
                const owned = game.ownedSkins.includes(skin.id);
                if (!owned && items[i]) {
                    const sub = items[i].querySelector('.skin-sub');
                    sub.textContent = `Unlock: ${commas(skin.cost)} spins`;
                }
            });
        }

        function clickEventTrigger(e) {
            if (e.target.closest('.panel')) return;

            game.spins += game.clickPower;
            game.velocity += (game.clickPower * 0.12) + 2; 
            
            if (e.clientX && e.clientY) {
                const popup = document.createElement('div');
                popup.className = 'click-popup';
                popup.textContent = `+${commas(game.clickPower)}`;
                popup.style.left = `${e.clientX - 25}px`;
                popup.style.top = `${e.clientY - 20}px`;
                document.body.appendChild(popup);
                setTimeout(() => popup.remove(), 800);
            }
            updateStorePanels();
        }

        function buyUpgrade(type) {
            if (game.spins < game.costs[type]) return;

            game.spins -= game.costs[type];
            
            if (type === 'whetstone') {
                game.clickPower += 1;
            } else if (type === 'balanced') {
                game.passiveSps += 0.5; 
            } else if (type === 'autospinner') {
                game.autoclickerPurchased = true;
                game.autoclickActive = true;
            }

            game.costs[type] = Math.round(game.costs[type] * 1.28);
            updateStorePanels();
        }

        // --- TICK TIME EVENT FRAME ENGINE ---
        let lastAutoClickTime = 0;
        
        function mainLoop(timestamp) {
            if (game.passiveSps > 0) {
                game.spins += (game.passiveSps / 60);
                game.velocity += (game.passiveSps * 0.05);
            }

            if (game.autoclickerPurchased && game.autoclickActive && timestamp - lastAutoClickTime > 400) {
                game.spins += game.clickPower;
                game.velocity += (game.clickPower * 0.08);
                lastAutoClickTime = timestamp;
            }

            game.angle += (game.velocity * Math.PI) / 180;
            game.velocity *= game.friction;
            if (game.velocity < 0.01) game.velocity = 0;

            game.rpm = Math.round(game.velocity * 10);

            drawScene();
            updateStorePanels();

            requestAnimationFrame(mainLoop);
        }

        // --- INTERACTIVE SYSTEM EVENT LISTENERS ---
        wrapper.addEventListener('mousedown', clickEventTrigger);
        ui.whetstone.addEventListener('click', () => buyUpgrade('whetstone'));
        ui.balanced.addEventListener('click', () => buyUpgrade('balanced'));
        ui.autospinner.addEventListener('click', () => buyUpgrade('autospinner'));
        
        document.getElementById('autoclick-btn').addEventListener('click', () => {
            if (!game.autoclickerPurchased) return;
            game.autoclickActive = !game.autoclickActive;
            updateStorePanels();
        });

        renderSkinGrid();
        requestAnimationFrame(mainLoop);
    </script>
</body>
</html>
